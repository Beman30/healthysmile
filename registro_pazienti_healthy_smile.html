
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .header { display: flex; align-items: center; gap: 12px; padding: 1.5rem 0 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
  .logo { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 18px; height: 18px; fill: white; }
  .brand { font-size: 13px; color: var(--color-text-secondary); font-weight: 400; }
  .title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .form-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .form-row input { flex: 1; height: 38px; padding: 0 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 0.15s; }
  .form-row input:focus { border-color: #1D9E75; box-shadow: 0 0 0 2px rgba(29,158,117,0.12); }
  .form-row button { height: 38px; padding: 0 18px; background: #1D9E75; color: white; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.15s; font-family: var(--font-sans); }
  .form-row button:hover { background: #0F6E56; }
  .stats { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .stat { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { width: 100%; height: 36px; padding: 0 12px 0 36px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; font-family: var(--font-sans); outline: none; }
  .search-wrap input:focus { border-color: #1D9E75; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--color-text-tertiary); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th { text-align: left; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); transition: background 0.1s; }
  tbody tr:hover { background: var(--color-background-secondary); }
  tbody td { padding: 10px 12px; color: var(--color-text-primary); vertical-align: middle; }
  .code-badge { display: inline-block; font-family: var(--font-mono); font-size: 12px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 8px; color: var(--color-text-secondary); letter-spacing: 0.03em; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: #9FE1CB; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #0F6E56; margin-right: 8px; flex-shrink: 0; }
  .name-cell { display: flex; align-items: center; }
  .del-btn { background: none; border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--color-text-tertiary); transition: all 0.15s; font-size: 14px; }
  .del-btn:hover { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .empty { text-align: center; padding: 3rem 0; color: var(--color-text-tertiary); font-size: 14px; }
  .export-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .export-btn { height: 32px; padding: 0 14px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; }
  .export-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .added-label { font-size: 11px; color: var(--color-text-tertiary); }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1D9E75; color: white; padding: 8px 16px; border-radius: var(--border-radius-md); font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Registro pazienti Healthy Smile — inserisci nome e codice, i dati sono salvati localmente</h2>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <div>
    <div class="brand">Healthy Smile By N</div>
    <div class="title">Registro pazienti</div>
  </div>
</div>

<div class="form-row">
  <input type="text" id="inp-nome" placeholder="Nome e cognome paziente" autocomplete="off" />
  <input type="text" id="inp-codice" placeholder="Codice paziente" autocomplete="off" style="flex: 0 0 160px;" />
  <button onclick="aggiungi()">+ Aggiungi</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Pazienti totali</div><div class="stat-value" id="count">0</div></div>
  <div class="stat"><div class="stat-label">Ultimo aggiunto</div><div class="stat-value" id="last" style="font-size:15px; padding-top:4px;">—</div></div>
</div>

<div class="search-wrap">
  <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
  <input type="text" id="search" placeholder="Cerca per nome o codice..." oninput="render()" />
</div>

<table>
  <thead>
    <tr>
      <th style="width:44%">Paziente</th>
      <th style="width:28%">Codice</th>
      <th style="width:20%">Aggiunto</th>
      <th style="width:8%"></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div id="empty" class="empty" style="display:none">Nessun paziente trovato</div>

<div class="export-row">
  <button class="export-btn" onclick="esportaCSV()">Esporta CSV</button>
  <button class="export-btn" onclick="stampaPDF()">Stampa</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'hs_registro_v1';
let pazienti = [];

function carica() {
  try { pazienti = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { pazienti = []; }
}
function salva() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(pazienti));
}
function iniziali(nome) {
  return nome.trim().split(/\s+/).slice(0,2).map(p=>p[0]?.toUpperCase()||'').join('');
}
function formatData(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function aggiungi() {
  const nome = document.getElementById('inp-nome').value.trim();
  const codice = document.getElementById('inp-codice').value.trim();
  if (!nome || !codice) { showToast('Inserisci nome e codice'); return; }
  pazienti.unshift({ id: Date.now(), nome, codice, data: new Date().toISOString() });
  salva();
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-codice').value = '';
  render();
  showToast('Paziente aggiunto');
}
function elimina(id) {
  pazienti = pazienti.filter(p => p.id !== id);
  salva();
  render();
}
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtrati = q ? pazienti.filter(p => p.nome.toLowerCase().includes(q) || p.codice.toLowerCase().includes(q)) : pazienti;
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = pazienti.length;
  document.getElementById('last').textContent = pazienti.length ? pazienti[0].nome.split(' ')[0] : '—';
  if (!filtrati.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = filtrati.map(p => `
    <tr>
      <td><div class="name-cell"><div class="avatar">${iniziali(p.nome)}</div>${p.nome}</div></td>
      <td><span class="code-badge">${p.codice}</span></td>
      <td><span class="added-label">${formatData(p.data)}</span></td>
      <td><button class="del-btn" onclick="elimina(${p.id})" title="Rimuovi">×</button></td>
    </tr>`).join('');
}
function esportaCSV() {
  const rows = [['Nome','Codice','Data aggiunta'],...pazienti.map(p=>[p.nome, p.codice, formatData(p.data)])];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'pazienti_healthy_smile.csv';
  a.click();
}
function stampaPDF() { window.print(); }

document.getElementById('inp-codice').addEventListener('keydown', e => { if(e.key==='Enter') aggiungi(); });
document.getElementById('inp-nome').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-codice').focus(); });

carica();
render();
</script>
