*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0e0e0e;--white:#fafaf8;--gray-100:#f2f1ee;--gray-300:#d4d2cc;
  --gray-500:#888680;--gray-700:#4a4845;--accent:#1a6b4a;--accent-light:#e8f4ef;
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--white);color:var(--black);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}

nav{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-300);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-family:var(--serif);font-size:18px;color:var(--black);text-decoration:none;letter-spacing:-0.01em}
.nav-logo em{font-style:italic;color:var(--accent)}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-links a{font-size:13px;font-weight:400;color:var(--gray-700);text-decoration:none;padding:6px 12px;border-radius:6px;transition:background 0.15s}
.nav-links a:hover{background:var(--gray-100)}
.nav-links a.active{color:var(--accent);font-weight:500}
.nav-cta{font-size:13px !important;font-weight:500 !important;background:var(--black);color:var(--white) !important;padding:8px 16px !important;border-radius:6px;transition:opacity 0.15s}
.nav-cta:hover{opacity:0.85;background:var(--black) !important}

.hero{max-width:900px;margin:0 auto;padding:96px 24px 80px;text-align:center}
.hero-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:4px 12px;border-radius:20px;margin-bottom:32px}
.hero h1{font-family:var(--serif);font-size:clamp(42px,7vw,80px);line-height:1.05;letter-spacing:-0.02em;color:var(--black);margin-bottom:16px}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero-sub{font-size:clamp(17px,2.5vw,20px);color:var(--gray-700);max-width:580px;margin:0 auto 40px;font-weight:300;line-height:1.5}
